<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>计算机组成原理期末刷题系统｜详细解析版</title>
<style>
:root {
  --primary:#243447; --secondary:#2d8cff; --success:#23a455; --danger:#e34b4b; --warning:#f39c12;
  --bg:#f4f7fb; --card:#fff; --text:#243447; --muted:#7b8794; --line:#e7ecf3;
}
* { box-sizing: border-box; }
body { margin:0; padding:12px; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif; line-height:1.65; }
.container { max-width:920px; margin:0 auto; }
h1 { font-size:22px; text-align:center; margin:10px 0 14px; color:var(--primary); }
.sub { text-align:center; color:var(--muted); font-size:13px; margin-top:-8px; margin-bottom:12px; }
.board { background:linear-gradient(135deg,#243447,#335d86); color:white; border-radius:14px; padding:14px; box-shadow:0 8px 22px rgba(32,54,86,.18); margin-bottom:12px; }
.board-row { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.board h2 { margin:0; font-size:17px; }
.board small { opacity:.9; }
.progress-bg { width:100%; height:10px; background:rgba(255,255,255,.22); border-radius:999px; overflow:hidden; margin-top:10px; }
.progress-fill { height:100%; width:0%; background:#34d399; transition:.25s; }
.wrong-board { background:var(--card); border-radius:12px; padding:12px; box-shadow:0 2px 10px rgba(23,40,65,.06); margin-bottom:12px; }
.wrong-title { display:flex; justify-content:space-between; align-items:center; gap:8px; font-weight:700; margin-bottom:8px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.stat { border:1px solid var(--line); border-radius:10px; padding:8px; text-align:center; background:#fbfdff; }
.stat b { display:block; font-size:16px; color:var(--danger); }
.stat span { display:block; font-size:12px; color:var(--muted); }
.toolbar { position:sticky; top:0; z-index:10; background:rgba(244,247,251,.94); backdrop-filter:blur(8px); padding:8px 0 10px; }
.filter-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; }
.filter-btn { flex:0 0 auto; border:1px solid var(--secondary); color:var(--secondary); background:white; border-radius:999px; padding:8px 11px; font-size:13px; cursor:pointer; }
.filter-btn.active { background:var(--secondary); color:white; }
.search-row { display:flex; gap:8px; }
.search-row input { flex:1; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; outline:none; }
.search-row button, .mini-btn { border:none; background:#eef4ff; color:#2563eb; border-radius:10px; padding:9px 11px; font-size:13px; cursor:pointer; }
.retry-all-btn { border:none; background:linear-gradient(135deg, #ff922b, #f08c00); color:white; border-radius:10px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; display:none; }
.question-card { background:var(--card); border-radius:14px; padding:15px; margin:12px 0; box-shadow:0 3px 14px rgba(23,40,65,.07); border-left:5px solid transparent; }
.question-card.correct { border-left-color:var(--success); }
.question-card.wrong { border-left-color:var(--danger); }
.card-header { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:9px; margin-bottom:10px; }
.tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag { border-radius:6px; padding:3px 7px; font-size:12px; font-weight:700; }
.tag.kp { background:#e8f3ff; color:#1d75d8; }
.tag.type { background:#f1f2f6; color:#6b7280; }
.qid { color:#9aa4b2; font-size:12px; white-space:nowrap; }
.question-text { font-size:16px; font-weight:650; margin:10px 0 12px; white-space:pre-line; }
.options { display:flex; flex-direction:column; gap:8px; }
.option { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); border-radius:10px; padding:10px; background:#fff; cursor:pointer; }
.option:hover { background:#f8fbff; }
.option input { margin-top:4px; transform:scale(1.15); }
.actions { display:flex; gap:8px; margin-top:12px; }
.submit-btn { flex:1; border:none; background:var(--secondary); color:white; border-radius:10px; padding:11px; font-weight:700; cursor:pointer; }
.submit-btn:disabled { background:#bcc6d3; cursor:not-allowed; }
.wrong-toggle { border:none; border-radius:10px; padding:11px; background:#fff0f0; color:#cf2e2e; font-weight:700; cursor:pointer; }
.feedback { display:none; margin-top:12px; border-radius:10px; padding:12px; font-size:14px; white-space:pre-line; }
.feedback.show { display:block; }
.feedback.ok { background:#ecfdf3; border:1px solid #b9f1cc; }
.feedback.bad { background:#fff0f0; border:1px solid #ffc7c7; }
.correct-answer { color:#d93025; font-weight:800; }
.empty { text-align:center; color:#8b96a5; padding:32px 10px; }
.footer-space { height:40px; }

/* 封面机制样式 */
#coverPage {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  z-index: 99999; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px; color: white; text-align: center;
}
.cover-title { font-size: 28px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px; color: #f8fafc; }
.cover-warning { font-size: 20px; color: #ef4444; font-weight: 700; margin-bottom: 30px; animation: blink 1.2s infinite; }
.cover-box {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  padding: 25px; border-radius: 16px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.cover-box p { font-size: 15px; color: #94a3b8; margin-top: 0; margin-bottom: 20px; }
.cover-btn {
  width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;
}
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-success { background: #16a34a; color: white; }
.btn-success:hover { background: #15803d; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* 拦截死机样式 */
.killed { background: #000 !important; color: #15ff00 !important; font-family: monospace !important; padding: 40px 20px !important; display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; }
.killed-msg { font-size: 24px; text-align: center; line-height: 2; font-weight: 900; color: #ff0000; }
</style>
</head>
<body>

<!-- 权限拦截封面 -->
<div id="coverPage">
  <div class="cover-box">
    <div class="cover-title">计组期末核心题库</div>
    <div class="cover-warning">⚠️ 林坤明不许看 ⚠️</div>
    <p>请进行身份核验以继续访问系统</p>
    <button class="cover-btn btn-danger" onclick="denyAccess()">林坤明收到</button>
    <button class="cover-btn btn-success" onclick="allowAccess()">林坤明没收到</button>
  </div>
</div>

<div class="container">
  <h1>计算机组成原理期末刷题系统</h1>
  <div class="sub">179题全数据解析版｜单选 / 多选 / 判断｜一键重刷全部错题</div>
  <div class="board">
    <div class="board-row">
      <h2>总进度：<span id="progressText">0 / 0</span></h2>
      <small id="percentText">0%</small>
    </div>
    <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="wrong-board">
    <div class="wrong-title">
      <span>错题统计</span>
      <div>
        <button class="retry-all-btn" id="retryAllBtn" onclick="retryAllWrongQuestions()">🔄 一键重刷全部错题</button>
        <button class="mini-btn" onclick="clearAllRecords()">清空记录</button>
      </div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>
  <div class="toolbar">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">全部 <span id="badge-all"></span></button>
      <button class="filter-btn" data-filter="single">单选 <span id="badge-single"></span></button>
      <button class="filter-btn" data-filter="multi">多选 <span id="badge-multi"></span></button>
      <button class="filter-btn" data-filter="tf">判断 <span id="badge-tf"></span></button>
      <button class="filter-btn" data-filter="wrong">错题集 <span id="badge-wrong"></span></button>
    </div>
    <div class="search-row">
      <input id="searchInput" placeholder="搜索题干、知识点、答案或解析..." oninput="render()" />
      <button onclick="document.getElementById('searchInput').value=''; render();">清除</button>
    </div>
  </div>
  <div id="quizContainer"></div>
  <div class="footer-space"></div>
</div>

<script>
// 封面拦截逻辑
function denyAccess() {
  const cover = document.getElementById('coverPage');
  cover.innerHTML = `
    <div class="killed-msg">
      [CRITICAL_ERROR] ACCESS_DENIED_FOR_LINKUNMING<br><br>
      都说了不许看！系统已永久锁定！<br>
      请自觉关闭本网页。
    </div>
  `;
  document.body.className = "killed";
}

function allowAccess() {
  const cover = document.getElementById('coverPage');
  cover.style.display = 'none';
}

// 计组客观题库数据 (179道)
const questionsData = [
  {"id":1,"type":"single","typeName":"单选题","kp":"计算机体系结构","text":"冯·诺依曼结构计算机的主要思想是什么？","options":[{"val":"A","text":"A.采用二进制表示指令和数据"},{"val":"B","text":"B.存储程序工作方式"},{"val":"C","text":"C.由五个基本部件组成"},{"val":"D","text":"D.以上都是"}],"answer":"D","analysis":"冯·诺依曼三大核心思想：二进制存储指令与数据、存储程序原理、运算器/控制器/存储器/输入/输出五大部件，ABC全部正确，选D。"},
  {"id":2,"type":"single","typeName":"单选题","kp":"计算机硬件组成","text":"下列哪一项不是冯·诺依曼结构计算机的基本部件？","options":[{"val":"A","text":"A.运算器"},{"val":"B","text":"B.控制器"},{"val":"C","text":"C.硬盘"},{"val":"D","text":"D.存储器"}],"answer":"C","analysis":"五大基础部件为运算器、控制器、存储器、输入设备、输出设备；硬盘属于外部存储外设，不属于五大核心部件。"},
  {"id":3,"type":"single","typeName":"单选题","kp":"数据编码基础","text":"计算机中采用二进制编码的主要原因是？","options":[{"val":"A","text":"A.制造稳定态的物理器件容易"},{"val":"B","text":"B.运算规则简单"},{"val":"C","text":"C.与逻辑命题对应"},{"val":"D","text":"D.以上都是"}],"answer":"D","analysis":"二进制优势：硬件仅需高低两种稳态易实现；加减乘除运算规则简单；0、1可直接对应逻辑真假，三点均成立。"},
  {"id":4,"type":"single","typeName":"单选题","kp":"计算机发展史","text":"下列哪一代计算机首次采用晶体管作为逻辑元件？","options":[{"val":"A","text":"A.第一代"},{"val":"B","text":"B.第二代"},{"val":"C","text":"C.第三代"},{"val":"D","text":"D.第四代"}],"answer":"B","analysis":"第一代：电子管；第二代：晶体管；第三代：中小规模集成电路；第四代：超大规模集成电路。"},
  {"id":5,"type":"single","typeName":"单选题","kp":"系统抽象层","text":"计算机系统的抽象层中，指令系统位于哪一层？","options":[{"val":"A","text":"A.硬件与软件的接口"},{"val":"B","text":"B.操作系统与硬件的接口"},{"val":"C","text":"C.应用程序与操作系统的接口"},{"val":"D","text":"D.编译器与操作系统的接口"}],"answer":"A","analysis":"指令集是硬件和所有软件（编译器、OS、应用）之间的标准交互接口。"},
  {"id":6,"type":"single","typeName":"单选题","kp":"性能指标","text":"下列哪一项不是计算机系统的主要性能指标？","options":[{"val":"A","text":"A.响应时间"},{"val":"B","text":"B.吞吐量"},{"val":"C","text":"C.功耗"},{"val":"D","text":"D.带宽"}],"answer":"C","analysis":"响应时间、吞吐量、带宽衡量运算/传输性能；功耗属于能耗指标，不属于运行性能指标。"},
  {"id":7,"type":"single","typeName":"单选题","kp":"浮点数标准","text":"计算机中用于表示浮点数的标准是？","options":[{"val":"A","text":"A.ASCII"},{"val":"B","text":"B.IEEE 754"},{"val":"C","text":"C.BCD"},{"val":"D","text":"D.Unicode"}],"answer":"B","analysis":"IEEE 754是全球统一浮点数标准；ASCII、Unicode为字符编码；BCD用于十进制编码。"},
  {"id":8,"type":"single","typeName":"单选题","kp":"补码运算","text":"补码表示法中，-1的8位补码是？","options":[{"val":"A","text":"A.10000001"},{"val":"B","text":"B.11111111"},{"val":"C","text":"C.00000001"},{"val":"D","text":"D.11111110"}],"answer":"B","analysis":"8位有符号数，-1原码10000001，反码11111110，补码=反码+1=11111111。"},
  {"id":9,"type":"single","typeName":"单选题","kp":"寻址方式","text":"下列哪种寻址方式中，操作数直接包含在指令中？","options":[{"val":"A","text":"A.直接寻址"},{"val":"B","text":"B.间接寻址"},{"val":"C","text":"C.立即寻址"},{"val":"D","text":"D.寄存器寻址"}],"answer":"C","analysis":"立即寻址：指令内直接存放操作数；直接寻址存内存地址；寄存器寻址操作数存寄存器。"},
  {"id":10,"type":"single","typeName":"单选题","kp":"MIPS指令集","text":"MIPS指令集中，R-Type指令的功能由哪个字段决定？","options":[{"val":"A","text":"A.OP"},{"val":"B","text":"B.rs"},{"val":"C","text":"C.func"},{"val":"D","text":"D.shamt"}],"answer":"C","analysis":"R型指令OP固定为0，rs/rt为源寄存器，shamt移位量，func区分add/sub/and等运算功能。"},
  {"id":11,"type":"single","typeName":"单选题","kp":"RISC设计风格","text":"下列哪一项不是RISC设计风格的特点？","options":[{"val":"A","text":"A.指令系统复杂"},{"val":"B","text":"B.指令周期短"},{"val":"C","text":"C.大量通用寄存器"},{"val":"D","text":"D.采用组合逻辑控制"}],"answer":"A","analysis":"指令系统复杂是CISC特征；RISC特点：定长简单指令、单周期、通用寄存器多、组合逻辑控制。"},
  {"id":12,"type":"single","typeName":"单选题","kp":"MIPS寄存器","text":"在MIPS中，用于过程调用时保存返回地址的寄存器是？","options":[{"val":"A","text":"A.$sp"},{"val":"B","text":"B.$ra"},{"val":"C","text":"C.$fp"},{"val":"D","text":"D.$gp"}],"answer":"B","analysis":"ra=return address存储子程序返回地址；sp栈指针，fp帧指针，gp全局指针。"},
  {"id":13,"type":"single","typeName":"单选题","kp":"数据类型","text":"下列哪一项不是非数值数据的类型？","options":[{"val":"A","text":"A.逻辑数据"},{"val":"B","text":"B.西文字符"},{"val":"C","text":"C.浮点数"},{"val":"D","text":"D.汉字"}],"answer":"C","analysis":"浮点数属于数值数据；逻辑量、字符、汉字均为非数值数据。"},
  {"id":14,"type":"single","typeName":"单选题","kp":"字符编码","text":"汉字内码的主要作用是？","options":[{"val":"A","text":"A.输入汉字"},{"val":"B","text":"B.存储和查找汉字"},{"val":"C","text":"C.显示汉字字形"},{"val":"D","text":"D.打印汉字"}],"answer":"B","analysis":"输入码负责输入；内码是计算机内部存储、处理、检索汉字编码；字形码用于显示打印。"},
  {"id":15,"type":"single","typeName":"单选题","kp":"BCD编码","text":"下列哪种编码方式用于表示十进制数？","options":[{"val":"A","text":"A.ASCII"},{"val":"B","text":"B.BCD"},{"val":"C","text":"C.Unicode"},{"val":"D","text":"D.补码"}],"answer":"B","analysis":"BCD码使用4位二进制表示1位十进制数字。"},
  {"id":16,"type":"single","typeName":"单选题","kp":"端模式","text":"数据的存储排列方式中，大端方式的特点是？","options":[{"val":"A","text":"A.低地址存放数据的高位"},{"val":"B","text":"B.低地址存放数据的低位"},{"val":"C","text":"C.高地址存放数据的高位"},{"val":"D","text":"D.高地址存放数据的低位"}],"answer":"A","analysis":"大端：低地址存高字节；小端：低地址存低字节。"},
  {"id":17,"type":"single","typeName":"单选题","kp":"端模式计算","text":"十六进制整数01234567H在32位小端表示的机器上的存储为（十六进制表示，从左到右为低字节到高字节）：","options":[{"val":"A","text":"A.01 23 45 67"},{"val":"B","text":"B.67 45 23 01"},{"val":"C","text":"C.10 32 54 76"},{"val":"D","text":"D.76 54 32 10"}],"answer":"B","analysis":"原数字四字节：01、23、45、67；小端字节逆序，低地址先存低字节，顺序67 45 23 01。"},
  {"id":18,"type":"single","typeName":"单选题","kp":"C语言指针与端模式","text":"在大端方式机中运行以下代码的结果是什么？\n#include<stdio.h>\nint main() {\n  int d=0x1234567;\n  char *p=(char *)&d;\n  printf(\"%X\", *(p+1));\n}","options":[{"val":"A","text":"A.67"},{"val":"B","text":"B.45"},{"val":"C","text":"C.23"},{"val":"D","text":"D.1"}],"answer":"C","analysis":"0x01234567四字节大端排布：01（低地址）、23、45、67；p指向01，p+1指向23，输出23。"},
  {"id":19,"type":"single","typeName":"单选题","kp":"MIPS控制指令","text":"MIPS指令集中，用于无条件跳转的指令是？","options":[{"val":"A","text":"A.j"},{"val":"B","text":"B.beq"},{"val":"C","text":"C.bne"},{"val":"D","text":"D.jal"}],"answer":"A","analysis":"j无条件跳转；beq/bne条件分支；jal跳转并保存返回地址。"},
  {"id":20,"type":"single","typeName":"单选题","kp":"条件状态码","text":"下列哪一项不是条件码的标志位？","options":[{"val":"A","text":"A.ZF"},{"val":"B","text":"B.CF"},{"val":"C","text":"C.PF"},{"val":"D","text":"D.SF"}],"answer":"C","analysis":"ZF零标志、CF进位标志、SF符号标志为核心条件标志；PF奇偶标志不用于常规分支判断。"},
  {"id":21,"type":"single","typeName":"单选题","kp":"MIPS栈控制","text":"在MIPS中，用于存储栈指针的寄存器是？","options":[{"val":"A","text":"A.$ra"},{"val":"B","text":"B.$sp"},{"val":"C","text":"C.$fp"},{"val":"D","text":"D.$gp"}],"answer":"B","analysis":"$sp=stack pointer栈指针。"},
  {"id":22,"type":"single","typeName":"单选题","kp":"符号扩展","text":"4位机器数1101带符号扩展成8位后的机器数为：","options":[{"val":"A","text":"A.1101 1111"},{"val":"B","text":"B.1111 1101"},{"val":"C","text":"C.0000 1101"},{"val":"D","text":"D.1101 1101"}],"answer":"B","analysis":"有符号数扩展高位补符号位1，1101扩展为11111101。"},
  {"id":23,"type":"single","typeName":"单选题","kp":"无符号扩展","text":"4位机器数1101无符号扩展成8位后的机器数为：","options":[{"val":"A","text":"A.1101 1111"},{"val":"B","text":"B.1111 1101"},{"val":"C","text":"C.0000 1101"},{"val":"D","text":"D.1101 1101"}],"answer":"C","analysis":"无符号数扩展高位补0，1101扩展为00001101。"},
  {"id":24,"type":"single","typeName":"单选题","kp":"指令系统设计","text":"下列哪一项不是指令系统设计的基本原则？","options":[{"val":"A","text":"A.指令尽量短"},{"val":"B","text":"B.操作码位数足够"},{"val":"C","text":"C.指令编码唯一"},{"val":"D","text":"D.指令长度必须固定"}],"answer":"D","analysis":"指令长度不强制固定，CISC架构存在变长指令。"},
  {"id":25,"type":"single","typeName":"单选题","kp":"MIPS位移指令","text":"在MIPS中，用于逻辑左移的指令 is？","options":[{"val":"A","text":"A.sll"},{"val":"B","text":"B.srl"},{"val":"C","text":"C.and"},{"val":"D","text":"D.or"}],"answer":"A","analysis":"sll逻辑左移；srl逻辑右移；and/or为逻辑运算。"},
  {"id":26,"type":"single","typeName":"单选题","kp":"寻址方式分类","text":"下列哪一项不是偏移寻址的方式？","options":[{"val":"A","text":"A.直接寻址"},{"val":"B","text":"B.基址寻址"},{"val":"C","text":"C.变址寻址"},{"val":"D","text":"D.相对寻址"}],"answer":"A","analysis":"偏移寻址包含基址、变址、相对寻址；直接寻址无偏移量。"},
  {"id":27,"type":"single","typeName":"单选题","kp":"MIPS访存指令","text":"在MIPS中，用于从内存加载字的指令是？","options":[{"val":"A","text":"A.lw"},{"val":"B","text":"B.sw"},{"val":"C","text":"C.lb"},{"val":"D","text":"D.sb"}],"answer":"A","analysis":"lw=load word读字；sw存字；lb/sb读写字节。"},
  {"id":28,"type":"single","typeName":"单选题","kp":"MIPS指令编码","text":"汇编表示\"add $t0 $s1 $s2\"对应的MIPS指令的机器码为（add func=32,t0=8,s1=17, s2=18）：","options":[{"val":"A","text":"A.000000 01000 10001 10010 00000 100000"},{"val":"B","text":"B.000000 10001 10010 01000 00000 100000"},{"val":"C","text":"C.100000 01000 10001 10010 00000 000000"},{"val":"D","text":"D.100000 10001 10010 01000 00000 000000"}],"answer":"B","analysis":"R型格式OP(6) rs(5) rt(5) rd(5) shamt(5) func(6)；OP=0，rs=s1=17，rt=s2=18，rd=$t0=8，shamt=0，func=32，对应选项B。"},
  {"id":29,"type":"single","typeName":"单选题","kp":"寻址机制","text":"下列哪一项不是指令的寻址方式？","options":[{"val":"A","text":"A.立即寻址"},{"val":"B","text":"B.直接寻址"},{"val":"C","text":"C.操作码寻址"},{"val":"D","text":"D.寄存器寻址"}],"answer":"C","analysis":"不存在“操作码寻址”，立即、直接、寄存器均为标准寻址方式。"},
  {"id":30,"type":"single","typeName":"单选题","kp":"体系结构风格","text":"下列哪一项不是指令设计风格的类型？","options":[{"val":"A","text":"A.累加器型"},{"val":"B","text":"B.堆栈型"},{"val":"C","text":"C.通用寄存器型"},{"val":"D","text":"D.直接型"}],"answer":"D","analysis":"三大经典指令架构：累加器、堆栈、通用寄存器型，无直接型。"},
  {"id":31,"type":"single","typeName":"单选题","kp":"MIPS子程序返回","text":"在MIPS中，用于从关系子过程返回的指令是？","options":[{"val":"A","text":"A.jr"},{"val":"B","text":"B.jal"},{"val":"C","text":"C.j"},{"val":"D","text":"D.beq"}],"answer":"A","analysis":"jr $ra跳转到返回地址实现子程序返回；jal用于调用子程序。"},
  {"id":32,"type":"single","typeName":"单选题","kp":"指令集分类","text":"下列哪一项不是指令的操作类型？","options":[{"val":"A","text":"A.数据传送"},{"val":"B","text":"B.算术运算"},{"val":"C","text":"C.逻辑运算"},{"val":"D","text":"D.操作系统调用"}],"answer":"D","analysis":"硬件指令操作包含数据传送、算术、逻辑、分支；系统调用属于软件层面，不属于硬件指令类型。"},
  {"id":33,"type":"single","typeName":"单选题","kp":"MIPS格式","text":"下列哪一项不是指令格式的类型？","options":[{"val":"A","text":"A.R-Type"},{"val":"B","text":"B.I-Type"},{"val":"C","text":"C.J-Type"},{"val":"D","text":"D.S-Type"}],"answer":"D","analysis":"MIPS仅R、I、J三类指令格式，无S-Type。"},
  {"id":34,"type":"single","typeName":"单选题","kp":"MIPS控制指令","text":"在MIPS中，用于条件分支的指令是？","options":[{"val":"A","text":"A.beq"},{"val":"B","text":"B.j"},{"val":"C","text":"C.jal"},{"val":"D","text":"D.jr"}],"answer":"A","analysis":"beq相等条件分支；j无条件跳转，jal调用，jr返回。"},
  {"id":35,"type":"single","typeName":"单选题","kp":"指令系统设计","text":"下列哪一项不是指令系统设计的基本问题？","options":[{"val":"A","text":"A.操作码的组成"},{"val":"B","text":"B.数据类型"},{"val":"C","text":"C.指令格式"},{"val":"D","text":"D.操作系统类型"}],"answer":"D","analysis":"指令设计关注操作码、数据类型、指令编码格式，与操作系统无关.</td>"},
  {"id":36,"type":"single","typeName":"单选题","kp":"指令执行周期","text":"下列哪一项不是指令的执行步骤？","options":[{"val":"A","text":"A.取指令"},{"val":"B","text":"B.译码"},{"val":"C","text":"C.执行"},{"val":"D","text":"D.打印结果"}],"answer":"D","analysis":"CPU标准执行流程：取指、译码、执行、访存、写回；打印是外设操作，不属于CPU硬件步骤。"},
  {"id":37,"type":"single","typeName":"单选题","kp":"操作数寻址","text":"下列哪一项不是指令的操作数来源？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.存储器"},{"val":"C","text":"C.立即数"},{"val":"D","text":"D.操作码"}],"answer":"D","analysis":"操作数来源：寄存器、内存、指令内立即数；操作码是运算标识，不是操作数。"},
  {"id":38,"type":"single","typeName":"单选题","kp":"指令编码","text":"下列哪一项不是指令的编码方式？","options":[{"val":"A","text":"A.定长编码"},{"val":"B","text":"B.扩展编码"},{"val":"C","text":"C.哈夫曼编码"},{"val":"D","text":"D.变长编码"}],"answer":"C","analysis":"指令编码分为定长、扩展、变长；哈夫曼是压缩编码，不用于指令编码。"},
  {"id":39,"type":"single","typeName":"单选题","kp":"单周期控制信号","text":"add指令的RegWr和MemtoReg信号分别为：","options":[{"val":"A","text":"A.0 1"},{"val":"B","text":"B.1 0"},{"val":"C","text":"C.0 0"},{"val":"D","text":"D.1 1"}],"answer":"B","analysis":"add运算结果写入寄存器，RegWr=1；不访问内存，MemtoReg=0。"},
  {"id":40,"type":"single","typeName":"单选题","kp":"单周期控制信号","text":"lw指令的Branch和MemWr信号分别为：","options":[{"val":"A","text":"A.0 0"},{"val":"B","text":"B.0 1"},{"val":"C","text":"C.1 0"},{"val":"D","text":"D.1 1"}],"answer":"A","analysis":"lw是加载字，非分支指令Branch=0；仅读内存不写内存MemWr=0。"},
  {"id":41,"type":"single","typeName":"单选题","kp":"单周期控制信号","text":"关于指令控制信号，错误的是：","options":[{"val":"A","text":"A.lw指令的ALUctr取值为addu"},{"val":"B","text":"B.sw指令的ALUctr取值为addu"},{"val":"C","text":"C.sw指令的ExtOp取值为0"},{"val":"D","text":"D.add指令的MemWr取值为0"}],"answer":"C","analysis":"sw需要扩展立即数计算地址，ExtOp=1，C错误；lw/sw均用加法算地址，add不写内存MemWr=0。"},
  {"id":42,"type":"single","typeName":"单选题","kp":"数据通路","text":"数据通路的功能是：","options":[{"val":"A","text":"A.存储指令和数据"},{"val":"B","text":"B.进行数据存储、处理和传送"},{"val":"C","text":"C.控制指令的执行顺序"},{"val":"D","text":"D.生成时钟信号"}],"answer":"B","analysis":"数据通路负责数据传输、运算、临时存储；控制器控制流程，时钟电路生成时钟。"},
  {"id":43,"type":"single","typeName":"单选题","kp":"单周期处理器","text":"单周期处理器的CPI为：","options":[{"val":"A","text":"A.0"},{"val":"B","text":"B.1"},{"val":"C","text":"C.2"},{"val":"D","text":"D.可变"}],"answer":"B","analysis":"单周期每条指令占用1个完整时钟周期，CPI=1。"},
  {"id":44,"type":"single","typeName":"单选题","kp":"单周期核心瓶颈","text":"下列哪条指令的执行时间最长？","options":[{"val":"A","text":"A.add"},{"val":"B","text":"B.lw"},{"val":"C","text":"C.beq"},{"val":"D","text":"D.j"}],"answer":"B","analysis":"lw需要访存步骤，流程最长，决定单周期时钟周期长度。"},
  {"id":45,"type":"single","typeName":"单选题","kp":"时钟周期设计","text":"在单周期处理器中，时钟周期的宽度由什么决定？","options":[{"val":"A","text":"A.最短指令的执行时间"},{"val":"B","text":"B.最长指令的执行时间"},{"val":"C","text":"C.所有指令的平均执行时间"},{"val":"D","text":"D.指令的条数"}],"answer":"B","analysis":"单周期所有指令共用同一时钟，周期必须覆盖最慢指令（lw）耗时。"},
  {"id":46,"type":"single","typeName":"单选题","kp":"MIPS指令功能","text":"在MIPS指令集中，R-type指令的功能是：","options":[{"val":"A","text":"A.从内存读取数据"},{"val":"B","text":"B.将数据写入内存"},{"val":"C","text":"C.对寄存器中的数据进行运算"},{"val":"D","text":"D.跳转到目标地址"}],"answer":"C","analysis":"R型仅操作寄存器，完成算术/逻辑运算；lw/sw访存，j/jal跳转。"},
  {"id":47,"type":"single","typeName":"单选题","kp":"MIPS指令格式","text":"下列哪项是I-type指令的特点？","options":[{"val":"A","text":"A.使用立即数"},{"val":"B","text":"B.仅对寄存器操作"},{"val":"C","text":"C.无条件跳转"},{"val":"D","text":"D.不涉及ALU运算"}],"answer":"A","analysis":"I型包含16位立即数，用于访存、条件分支、立即数运算。"},
  {"id":48,"type":"single","typeName":"单选题","kp":"ALU核心功能","text":"在数据通路中，ALU的功能是：","options":[{"val":"A","text":"A.存储数据"},{"val":"B","text":"B.进行算术和逻辑运算"},{"val":"C","text":"C.控制指令执行顺序"},{"val":"D","text":"D.生成时钟信号"}],"answer":"B","analysis":"ALU算术逻辑单元，专门完成加减、与或、移位等运算。"},
  {"id":49,"type":"single","typeName":"单选题","kp":"单周期控制信号","text":"在单周期处理器中，控制信号：","options":[{"val":"A","text":"A.在每个时钟周期变化"},{"val":"B","text":"B.在整个指令执行过程中不变"},{"val":"C","text":"C.由微程序生成"},{"val":"D","text":"D.仅用于ALU"}],"answer":"B","analysis":"单周期一条指令完整占一个周期，译码后控制信号全程保持不变。"},
  {"id":50,"type":"single","typeName":"单选题","kp":"程序计数器","text":"在数据通路中，PC的功能是：","options":[{"val":"A","text":"A.存储指令"},{"val":"B","text":"B.存储下一条指令的地址"},{"val":"C","text":"C.存储数据"},{"val":"D","text":"D.控制ALU"}],"answer":"B","analysis":"Program Counter程序计数器，保存即将取出指令的内存地址。"},
  {"id":51,"type":"single","typeName":"单选题","kp":"单周期关键性能","text":"在单周期处理器中，Load指令的执行时间 is：","options":[{"val":"A","text":"A.最短的"},{"val":"B","text":"B.最长的"},{"val":"C","text":"C.平均的"},{"val":"D","text":"D.可变的"}],"answer":"B","analysis":"Load（lw）包含取指、译码、运算、访存、写回五步，耗时最长。"},
  {"id":52,"type":"single","typeName":"单选题","kp":"MIPS跳转寻址","text":"在MIPS中，Jump指令的目标地址计算方式是：","options":[{"val":"A","text":"A.PC+4+offset"},{"val":"B","text":"B.PC<31:28> concat target<25:0>"},{"val":"C","text":"C.从寄存器读取"},{"val":"D","text":"由ALU计算"}],"answer":"B","analysis":"J型跳转地址：PC高4位拼接指令内26位偏移，左移2位。"},
  {"id":53,"type":"single","typeName":"单选题","kp":"流水线机制","text":"流水线技术的主要目的是什么？","options":[{"val":"A","text":"A.减少指令的执行时间"},{"val":"B","text":"B.提高指令的吞吐率"},{"val":"C","text":"C.降低功耗"},{"val":"D","text":"D.简化硬件设计"}],"answer":"B","analysis":"流水线不缩短单条指令耗时，但多条指令重叠执行，提升单位时间完成指令数量（吞吐率）。"},
  {"id":54,"type":"single","typeName":"单选题","kp":"流水线阶段","text":"在MIPS流水线中，Load指令需要多少个阶段完成？","options":[{"val":"A","text":"A.3"},{"val":"B","text":"B.4"},{"val":"C","text":"C.5"},{"val":"D","text":"D.6"}],"answer":"C","analysis":"标准MIPS五级流水线：IF取指、ID译码、EX执行、MEM访存、WB写回，所有指令均5阶段。"},
  {"id":55,"type":"single","typeName":"单选题","kp":"流水线硬件友好度","text":"以下哪种指令集特征最有利于流水线执行？","options":[{"val":"A","text":"A.指令长度不一致"},{"val":"B","text":"B.格式多样且源寄存器位置不同"},{"val":"C","text":"C.指令长度一致且格式规整"},{"val":"D","text":"D.允许运算指令直接访问内存"}],"answer":"C","analysis":"RISC定长规整指令，各阶段硬件逻辑统一，极易流水线；变长、格式混乱会阻塞流水线。"},
  {"id":56,"type":"single","typeName":"单选题","kp":"结构冒险","text":"结构冒险（Structure Hazard）是指什么？","options":[{"val":"A","text":"A.指令间的数据依赖"},{"val":"B","text":"B.同一部件同时被不同指令使用"},{"val":"C","text":"C.分支指令改变程序流程"},{"val":"D","text":"D.异常中断的发生"}],"answer":"B","analysis":"结构冒险：硬件资源冲突，多条指令同时争抢同一功能部件。"},
  {"id":57,"type":"single","typeName":"单选题","kp":"数据冒险消除","text":"转发（Forwarding）技术主要用于解决哪种冒险？","options":[{"val":"A","text":"A.结构冒险"},{"val":"B","text":"B.数据冒险"},{"val":"C","text":"C.控制冒险"},{"val":"D","text":"D.异常中断"}],"answer":"B","analysis":"转发旁路将尚未写回寄存器的运算结果直接送至ALU输入，解决RAW数据冒险。"},
  {"id":58,"type":"single","typeName":"单选题","kp":"流水线设计","text":"在MIPS流水线中，R-type指令的写寄存器操作发生在哪个阶段？","options":[{"val":"A","text":"A.Exec"},{"val":"B","text":"B.Mem"},{"val":"C","text":"C.Wr"},{"val":"D","text":"D.Reg/Dec"}],"answer":"C","analysis":"五级流水线WB（写回）阶段完成寄存器写入。"},
  {"id":59,"type":"single","typeName":"单选题","kp":"流水线设计","text":"在MIPS流水线中，哪一阶段不需要控制信号？","options":[{"val":"A","text":"A.IF"},{"val":"B","text":"B.ID"},{"val":"C","text":"C.EX"},{"val":"D","text":"D.MEM"}],"answer":"A","analysis":"IF仅取指令，仅需PC自增逻辑，无需译码产生的控制信号。"},
  {"id":60,"type":"single","typeName":"单选题","kp":"编译优化控制冒险","text":"以下哪种技术可以消除循环内的分支指令？","options":[{"val":"A","text":"A.循环展开"},{"val":"B","text":"B.动态预测"},{"val":"C","text":"C.转发技术"},{"val":"D","text":"D.硬件阻塞"}],"answer":"A","analysis":"循环展开复制循环体，减少分支判断次数，消除循环内部分支。"},
  {"id":61,"type":"single","typeName":"单选题","kp":"流水线气泡","text":"以下哪种冒险会导致流水线插入\"气泡\"？","options":[{"val":"A","text":"A.结构冒险"},{"val":"B","text":"B.数据冒险"},{"val":"C","text":"C.控制冒险"},{"val":"D","text":"D.以上都是"}],"answer":"D","analysis":"资源冲突、数据依赖、分支跳转三类冒险均会插入流水线气泡暂停执行。"},
  {"id":62,"type":"single","typeName":"单选题","kp":"控制冒险解决","text":"在MIPS流水线中，分支指令的目标地址计算最早可以提前到哪个阶段？","options":[{"val":"A","text":"A.IF"},{"val":"B","text":"B.ID"},{"val":"C","text":"C.EX"},{"val":"D","text":"D.MEM"}],"answer":"B","analysis":"ID阶段读取寄存器、计算分支偏移，提前判断跳转地址，减少气泡。"},
  {"id":63,"type":"single","typeName":"单选题","kp":"控制冒险解决","text":"以下哪种方法不能解决控制冒险？","options":[{"val":"A","text":"A.静态分支预测"},{"val":"B","text":"B.动态分支预测"},{"val":"C","text":"C.转发技术"},{"val":"D","text":"D.延迟分支"}],"answer":"C","analysis":"转发仅解决数据冒险；预测、延迟分支用于缓解分支带来的控制冒险。"},
  {"id":64,"type":"single","typeName":"单选题","kp":"易失性存储","text":"以下哪种存储器属于易失性存储器？","options":[{"val":"A","text":"A.ROM"},{"val":"B","text":"B.DRAM"},{"val":"C","text":"C.磁盘"},{"val":"D","text":"D.光盘"}],"answer":"B","analysis":"DRAM断电电荷丢失，易失；ROM、磁盘、光盘断电数据保留，非易失。"},
  {"id":65,"type":"single","typeName":"单选题","kp":"Cache映射机制","text":"Cache的映射方式中，灵活性最高的是？","options":[{"val":"A","text":"A.直接映射"},{"val":"B","text":"B.全相联映射"},{"val":"C","text":"C.组相联映射"},{"val":"D","text":"D.顺序映射"}],"answer":"B","analysis":"全相联任意主存块可放入任意Cache行，冲突最少，灵活性最高，但硬件成本最高。"},
  {"id":66,"type":"single","typeName":"单选题","kp":"存储层次速度","text":"以下哪种存储器的工作速度最快？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.Cache"},{"val":"C","text":"C.主存"},{"val":"D","text":"D.硬盘"}],"answer":"A","analysis":"速度层级：寄存器 > Cache > 主存 > 磁盘。"},
  {"id":67,"type":"single","typeName":"单选题","kp":"DRAM特性","text":"DRAM需要定期刷新的原因是？","options":[{"val":"A","text":"A.数据以电荷形式存储"},{"val":"B","text":"B.存储单元由触发器构成"},{"val":"C","text":"C.采用随机存取方式"},{"val":"D","text":"D.容量较大"}],"answer":"A","analysis":"DRAM用电容存电荷，电荷缓慢泄漏，必须定时刷新补充电荷；SRAM触发器无需刷新。"},
  {"id":68,"type":"single","typeName":"单选题","kp":"直接映射关系","text":"在直接映射Cache中，主存块号与Cache行号的映射关系是？","options":[{"val":"A","text":"A.一对一"},{"val":"B","text":"B.多对一"},{"val":"C","text":"C.一对多"},{"val":"D","text":"D.多对多"}],"answer":"B","analysis":"直接映射主存块固定映射唯一Cache行，多个主存块共享同一行，多对一。"},
  {"id":69,"type":"single","typeName":"单选题","kp":"主存物理选型","text":"以下哪种存储器通常用于构建主存？","options":[{"val":"A","text":"A.SRAM"},{"val":"B","text":"B.DRAM"},{"val":"C","text":"C.ROM"},{"val":"D","text":"D.磁带"}],"answer":"B","analysis":"DRAM容量大、成本低，用作内存主存；SRAM高速昂贵，用于Cache。"},
  {"id":70,"type":"single","typeName":"单选题","kp":"Cache写策略","text":"Cache的写策略中，写回法（Write Back）的特点是？","options":[{"val":"A","text":"A.同时写Cache和主存"},{"val":"B","text":"B.只写Cache，不立即写主存"},{"val":"C","text":"C.直接写主存"},{"val":"D","text":"D.不写Cache"}],"answer":"B","analysis":"写回仅更新Cache块，块被替换时才一次性写入主存，减少主存访问。"},
  {"id":71,"type":"single","typeName":"单选题","kp":"局部性原理","text":"程序访问的局部性包括哪两种？","options":[{"val":"A","text":"A.时间和空间"},{"val":"B","text":"B.顺序和随机"},{"val":"C","text":"C.静态和动态"},{"val":"D","text":"D.读写和执行"}],"answer":"A","analysis":"时间局部性：刚访问的数据短期内重复访问；空间局部性：相邻地址数据连续访问。"},
  {"id":72,"type":"single","typeName":"单选题","kp":"页表加速TLB","text":"TLB的作用是？","options":[{"val":"A","text":"A.加快地址转换"},{"val":"B","text":"B.存储程序指令"},{"val":"C","text":"C.管理磁盘空间"},{"val":"D","text":"D.刷新DRAM"}],"answer":"A","analysis":"TLB是页表高速缓存，缓存虚拟-物理地址映射，加速地址转换。"},
  {"id":73,"type":"single","typeName":"单选题","kp":"组相联映射","text":"在组相联映射Cache中，主存块可以映射到Cache的？","options":[{"val":"A","text":"A.固定行"},{"val":"B","text":"B.固定组中的任意行"},{"val":"C","text":"C.任意行"},{"val":"D","text":"D.任意组"}],"answer":"B","analysis":"主存块固定对应唯一Cache组，组内任意一行均可存放。"},
  {"id":74,"type":"single","typeName":"单选题","kp":"虚拟存储器类别","text":"虚拟存储器的实现方式不包括？","options":[{"val":"A","text":"A.分页式"},{"val":"B","text":"B.分段式"},{"val":"C","text":"C.段页式"},{"val":"D","text":"D.直接映射式"}],"answer":"D","analysis":"直接映射是Cache映射策略，虚拟存储分页、分段、段页式三种。"},
  {"id":75,"type":"single","typeName":"单选题","kp":"运行期指令执行","text":"以下哪种存储器通常用于存放当前执行的指令和数据？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.主存"},{"val":"C","text":"C.硬盘"},{"val":"D","text":"D.光盘"}],"answer":"B","analysis":"程序运行时代码与数据载入主存；硬盘仅长期存储。"},
  {"id":76,"type":"single","typeName":"单选题","kp":"Cache命中指标","text":"Cache的命中时间（Hit Time）是指？","options":[{"val":"A","text":"A.判断是否命中的时间"},{"val":"B","text":"B.访问主存的时间"},{"val":"C","text":"C.访问磁盘的时间"},{"val":"D","text":"D.替换算法的时间"}],"answer":"A","analysis":"命中时间=访问Cache、对比标记判断命中的耗时。"},
  {"id":77,"type":"single","typeName":"单选题","kp":"Cache物理实现","text":"以下哪种存储器通常用于构建Cache？","options":[{"val":"A","text":"A.SRAM"},{"val":"B","text":"B.DRAM"},{"val":"C","text":"C.ROM"},{"val":"D","text":"D.磁盘"}],"answer":"A","analysis":"SRAM速度快、无需刷新，用于Cache；DRAM做主存。"},
  {"id":78,"type":"single","typeName":"单选题","kp":"长期不丢失外存","text":"以下哪种存储器通常用于长期存储数据？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.Cache"},{"val":"C","text":"C.主存"},{"val":"D","text":"D.硬盘"}],"answer":"D","analysis":"硬盘非易失，断电保存数据，长期存储文件程序。"},
  
  // 多选题数据
  {"id":79,"type":"multi","typeName":"多选题","kp":"冯诺依曼结构","text":"冯·诺依曼结构计算机的主要组成部分包括？","options":[{"val":"A","text":"A.运算器"},{"val":"B","text":"B.控制器"},{"val":"C","text":"C.存储器"},{"val":"D","text":"D.输入设备和输出设备"}],"answer":["A","B","C","D"],"analysis":"五大核心部件：运算器、控制器、存储器、输入设备、输出设备全选。"},
  {"id":80,"type":"multi","typeName":"多选题","kp":"MIPS指令译码汇编","text":"一条MIPS指令的机器码为000000 00101 01111 10000 00000 100000，其汇编形式如下（add func=32, sub func=34）：","options":[{"val":"A","text":"A.add $16,$5,$15"},{"val":"B","text":"B.add s0,a1,$t7"},{"val":"C","text":"C.add $5,$15,$16"},{"val":"D","text":"D.add a1,t7,$s0"}],"answer":["A","B"],"analysis":"R型rs=5(a1)，rt=15(t7)，rd=16($s0)，汇编格式add rd,rs,rt，即add s0,a1,$t7 等价add $16,$5,$15。选AB。"},
  {"id":81,"type":"multi","typeName":"多选题","kp":"二进制优势","text":"计算机中采用二进制编码的原因包括？","options":[{"val":"A","text":"A.制造稳定态的物理器件容易"},{"val":"B","text":"B.运算规则简单"},{"val":"C","text":"C.与逻辑命题对应"},{"val":"D","text":"D.便于与十进制转换"}],"answer":["A","B","C"],"analysis":"ABC是二进制核心优势；便于十进制转换不是采用二进制的硬件理由。"},
  {"id":82,"type":"multi","typeName":"多选题","kp":"运行期评价指标","text":"计算机性能评价的基本指标包括？","options":[{"val":"A","text":"A.响应时间"},{"val":"B","text":"B.吞吐量"},{"val":"C","text":"C.带宽"},{"val":"D","text":"D.功耗"}],"answer":["A","B","C"],"analysis":"响应时间、吞吐量、带宽衡量系统性能；功耗为能耗指标。"},
  {"id":83,"type":"multi","typeName":"多选题","kp":"数值量分类","text":"下列哪些是数值数据的表示方式？","options":[{"val":"A","text":"A.定点数"},{"val":"B","text":"B.浮点数"},{"val":"C","text":"C.十进制数"},{"val":"D","text":"D.逻辑数"}],"answer":["A","B","C"],"analysis":"定点、浮点、十进制BCD均为数值；逻辑数属于非数值量。"},
  {"id":84,"type":"multi","typeName":"多选题","kp":"规格化浮点","text":"下列哪些是浮点数的规格化形式？","options":[{"val":"A","text":"A.1.01×2^3"},{"val":"B","text":"B.0.01×2^5"},{"val":"C","text":"C.10.1×2^1"},{"val":"D","text":"D.1.0×2^0"}],"answer":["A","D"],"analysis":"IEEE规格化尾数整数位固定为1，AD符合；B、C整数位不为1，非规格化。"},
  {"id":85,"type":"multi","typeName":"多选题","kp":"IEEE754特殊符号","text":"下列哪些是IEEE754浮点数的特殊表示？","options":[{"val":"A","text":"A.0"},{"val":"B","text":"B.∞"},{"val":"C","text":"C.NaN"},{"val":"D","text":"D.非规格化数"}],"answer":["A","B","C","D"],"analysis":"IEEE754包含零、正负无穷、NaN、规格化、非规格化五类编码全选。"},
  {"id":86,"type":"multi","typeName":"多选题","kp":"补码物理特性","text":"下列哪些是补码的特性？","options":[{"val":"A","text":"A.0的表示唯一"},{"val":"B","text":"B.加减运算统一"},{"val":"C","text":"C.比原码多表示一个最小负数"},{"val":"D","text":"D.符号位与真值符号对应"}],"answer":["A","B","C","D"],"analysis":"补码零唯一；减法转为加法；n位补码范围比原码多一个负数；最高位1负0正。全部正确。"},
  {"id":87,"type":"multi","typeName":"多选题","kp":"寻址范畴","text":"下列哪些是寻址方式？","options":[{"val":"A","text":"A.立即寻址"},{"val":"B","text":"B.直接寻址"},{"val":"C","text":"C.寄存器寻址"},{"val":"D","text":"D.堆栈寻址"}],"answer":["A","B","C","D"],"analysis":"四项均为计算机标准寻址方式，全选。"},
  {"id":88,"type":"multi","typeName":"多选题","kp":"偏移寻址分类","text":"下列哪些是偏移寻址的方式？","options":[{"val":"A","text":"A.基址寻址"},{"val":"B","text":"B.变址寻址"},{"val":"C","text":"C.相对寻址"},{"val":"D","text":"D.间接寻址"}],"answer":["A","B","C"],"analysis":"偏移寻址三类：基址、变址、相对；间接寻址不属于偏移量相加寻址。"},
  {"id":89,"type":"multi","typeName":"多选题","kp":"MIPS操作范围","text":"下列哪些是MIPS的指令操作类型？","options":[{"val":"A","text":"A.算术运算"},{"val":"B","text":"B.逻辑运算"},{"val":"C","text":"C.数据传送"},{"val":"D","text":"D.条件分支"}],"answer":["A","B","C","D"],"analysis":"MIPS完整指令类型包含算术、逻辑、访存数据传送、分支跳转。全选。"},
  {"id":90,"type":"multi","typeName":"多选题","kp":"操作数类型","text":"下列哪些是操作数的类型？","options":[{"val":"A","text":"A.立即数"},{"val":"B","text":"B.寄存器操作数"},{"val":"C","text":"C.存储器操作数"},{"val":"D","text":"D.操作码"}],"answer":["A","B","C"],"analysis":"操作数三类：立即、寄存器、内存；操作码是运算操作标识，排除D。"},
  {"id":91,"type":"multi","typeName":"多选题","kp":"架构设计风格","text":"下列哪些是指令设计风格的类型？","options":[{"val":"A","text":"A.累加器型"},{"val":"B","text":"B.堆栈型"},{"val":"C","text":"C.通用寄存器型"},{"val":"D","text":"D.装入/存储型"}],"answer":["A","B","C","D"],"analysis":"通用寄存器型细分装入存储架构（MIPS），前三类为经典基础架构类型。"},
  {"id":92,"type":"multi","typeName":"多选题","kp":"数据通路职责","text":"数据通路的功能包括：","options":[{"val":"A","text":"A.数据存储"},{"val":"B","text":"B.数据处理"},{"val":"C","text":"C.数据传送"},{"val":"D","text":"D.指令译码"}],"answer":["A","B","C"],"analysis":"数据通路完成数据传输、运算、临时存储；译码属于控制器硬件逻辑。"},
  {"id":93,"type":"multi","typeName":"多选题","kp":"单周期缺陷","text":"单周期处理器的缺点包括：","options":[{"val":"A","text":"A.时钟周期过长"},{"val":"B","text":"B.功能部件不能重复使用"},{"val":"C","text":"C.设计复杂"},{"val":"D","text":"D.CPI可变"}],"answer":["A","B"],"analysis":"单周期时钟由最慢指令决定周期长；所有部件一条指令内独占，无法复用；CPI固定为1。"},
  {"id":94,"type":"multi","typeName":"多选题","kp":"单周期特性","text":"在单周期处理器中，控制信号的特点包括：","options":[{"val":"A","text":"A.在整个指令执行过程中不变"},{"val":"B","text":"B.由指令译码生成"},{"val":"C","text":"C.每个时钟周期变化"},{"val":"D","text":"D.由微程序生成"}],"answer":["A","B"],"analysis":"单周期一条指令占用一个周期，译码生成控制信号全程保持固定形态不变。"},
  {"id":95,"type":"multi","typeName":"多选题","kp":"MIPS指令分类","text":"下列哪些指令属于I-type？","options":[{"val":"A","text":"A.ori"},{"val":"B","text":"B.lw"},{"val":"C","text":"C.sw"},{"val":"D","text":"D.beq"}],"answer":["A","B","C","D"],"analysis":"立即逻辑ori、访存lw/sw、条件分支beq均为I型含立即数扩展指令。"},
  {"id":96,"type":"multi","typeName":"多选题","kp":"组合逻辑物理特征","text":"下列哪些是组合逻辑元件的特点？","options":[{"val":"A","text":"A.输出仅取决于当前输入"},{"val":"B","text":"B.具有存储功能"},{"val":"C","text":"C.无需时钟信号"},{"val":"D","text":"D.用于保存中间结果"}],"answer":["A","C"],"analysis":"组合逻辑无记忆，输出只由当前输入决定，不需要时钟；时序元件（如触发器、寄存器）才有存储功能。"},
  {"id":97,"type":"multi","typeName":"多选题","kp":"单周期设计边界","text":"单周期处理器的时钟周期宽度由什么决定？","options":[{"val":"A","text":"A.最长指令的执行时间"},{"val":"B","text":"B.Load指令的执行时间"},{"val":"C","text":"C.最短指令的执行时间"},{"val":"D","text":"D.平均指令执行时间"}],"answer":["A","B"],"analysis":"Load(lw)指令是单周期中耗时最长指令，由它决定时钟周期边界。"},
  {"id":98,"type":"multi","typeName":"多选题","kp":"PC计数器","text":"在数据通路中，PC的功能包括：","options":[{"val":"A","text":"A.存储指令"},{"val":"B","text":"B.存储下一条指令的地址"},{"val":"C","text":"C.控制指令执行顺序"},{"val":"D","text":"D.存储数据"}],"answer":["B","C"],"analysis":"PC存指令物理地址，通过自身自增或跳转地址改变控制取指顺序；不负责存放指令内容与计算数据。"},
  {"id":99,"type":"multi","typeName":"多选题","kp":"Load指令延迟","text":"在单周期处理器中，Load指令的执行时间是：","options":[{"val":"A","text":"A.最长的"},{"val":"B","text":"B.由存储器访问时间决定"},{"val":"C","text":"C.最短的"},{"val":"D","text":"D.可变的"}],"answer":["A","B"],"analysis":"lw包含访存这一全系统最慢步骤，耗时最长，访存物理延迟是构成它的核心主要部分。"},
  {"id":100,"type":"multi","typeName":"多选题","kp":"Load-use冒险消除","text":"以下哪种方法可以解决Load-use数据冒险？","options":[{"val":"A","text":"A.插入NOP指令"},{"val":"B","text":"B.硬件阻塞"},{"val":"C","text":"C.动态分支预测"},{"val":"D","text":"D.增加流水线级数"}],"answer":["A","B"],"analysis":"插入空气泡(NOP)、硬件暂停阻塞能够解决Load-use；分支预测对应解决控制冒险。"},
  {"id":101,"type":"multi","typeName":"多选题","kp":"MIPS五级流水线","text":"以下哪些是MIPS流水线的阶段？","options":[{"val":"A","text":"A.IF"},{"val":"B","text":"B.ID"},{"val":"C","text":"C.EX"},{"val":"D","text":"D.WB"}],"answer":["A","B","C","D"],"analysis":"经典MIPS五级流水线包含：IF、ID、EX、MEM、WB，选项全覆盖。"},
  {"id":102,"type":"multi","typeName":"多选题","kp":"结构冒险处理","text":"结构冒险的解决方法包括：","options":[{"val":"A","text":"A.增加功能部件"},{"val":"B","text":"B.插入NOP指令"},{"val":"C","text":"C.分开指令存储器和数据存储器"},{"val":"D","text":"D.动态分支预测"}],"answer":["A","B","C"],"analysis":"增加硬件组件、插入气泡、分离指令/数据Cache可消除硬件资源抢夺冲突；D解决控制冒险。"},
  {"id":103,"type":"multi","typeName":"多选题","kp":"数据冒险分类","text":"数据冒险的类型包括：","options":[{"val":"A","text":"A.RAW"},{"val":"B","text":"B.WAR"},{"val":"C","text":"C.WAW"},{"val":"D","text":"D.RAR"}],"answer":["A","B","C"],"analysis":"三类经典数据冒险：写后读(RAW)、读后写(WAR)、写后写(WAW)。没有读后读(RAR)冒险。"},
  {"id":104,"type":"multi","typeName":"多选题","kp":"控制冒险解决","text":"控制冒险的解决方法包括：","options":[{"val":"A","text":"A.静态分支预测"},{"val":"B","text":"B.动态分支预测"},{"val":"C","text":"C.延迟分支"},{"val":"D","text":"D.增加流水线级数"}],"answer":["A","B","C"],"analysis":"预测、延迟分支可极大缓解分支跳转引发的控制冒险；盲目增加级数反而会加剧控制冒险的气泡损失。"},
  {"id":105,"type":"multi","typeName":"多选题","kp":"动态预测技术","text":"以下哪些是动态分支预测的技术？","options":[{"val":"A","text":"A.一位预测位"},{"val":"B","text":"B.两位预测位"},{"val":"C","text":"C.编译器调度"},{"val":"D","text":"D.循环展开"}],"answer":["A","B"],"analysis":"1位、2位饱和计数器是硬件电路层面的动态预测技术；编译器调度和循环展开属于软件静态优化。"},
  {"id":106,"type":"multi","typeName":"多选题","kp":"流水线三大冒险","text":"以下哪些是流水线冒险的类型？","options":[{"val":"A","text":"A.结构冒险"},{"val":"B","text":"B.数据冒险"},{"val":"C","text":"C.控制冒险"},{"val":"D","text":"D.异常中断"}],"answer":["A","B","C"],"analysis":"经典流水线三大冒险阻碍：结构冒险、数据冒险、控制冒险。异常属于中断异常流。"},
  {"id":107,"type":"multi","typeName":"多选题","kp":"内部存储器","text":"以下哪些存储器属于内部存储器？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.Cache"},{"val":"C","text":"C.主存"},{"val":"D","text":"D.硬盘"}],"answer":["A","B","C"],"analysis":"寄存器、Cache、物理主存均属于主机核心内联存储系统；硬盘属于外设辅助存储。"},
  {"id":108,"type":"multi","typeName":"多选题","kp":"Cache映射分类","text":"Cache的映射方式包括？","options":[{"val":"A","text":"A.直接映射"},{"val":"B","text":"B.全相联映射"},{"val":"C","text":"C.组相联映射"},{"val":"D","text":"D.顺序映射"}],"answer":["A","B","C"],"analysis":"Cache三大通用标准经典映射策略，无顺序映射。"},
  {"id":109,"type":"multi","typeName":"多选题","kp":"虚存分类","text":"虚拟存储器的实现方式包括？","options":[{"val":"A","text":"A.分页式"},{"val":"B","text":"B.分段式"},{"val":"C","text":"C.段页式"},{"val":"D","text":"D.直接映射式"}],"answer":["A","B","C"],"analysis":"虚拟存储器主流为页式、段式、段页式管理；直接映射是属于Cache的映射术语。"},
  {"id":110,"type":"multi","typeName":"多选题","kp":"局部性分类","text":"以下哪些是程序访问的局部性表现？","options":[{"val":"A","text":"A.时间局部性"},{"val":"B","text":"B.空间局部性"},{"val":"C","text":"C.顺序局部性"},{"val":"D","text":"D.随机局部性"}],"answer":["A","B"],"analysis":"经典局部性仅划分时间局部性与空间局部性两类。"},
  {"id":111,"type":"multi","typeName":"多选题","kp":"RAM种类","text":"以下哪些是随机存取存储器（RAM）？","options":[{"val":"A","text":"A.SRAM"},{"val":"B","text":"B.DRAM"},{"val":"C","text":"C.ROM"},{"val":"D","text":"D.磁盘"}],"answer":["A","B"],"analysis":"静态SRAM、动态DRAM属于随机存取读写RAM；ROM为只读类型，磁盘属于串行/直接存取外存。"},
  {"id":112,"type":"multi","typeName":"多选题","kp":"Cache替换算法","text":"Cache的替换算法包括？","options":[{"val":"A","text":"A.FIFO"},{"val":"B","text":"B.LRU"},{"val":"C","text":"C.LFU"},{"val":"D","text":"D.随机替换"}],"answer":["A","B","C","D"],"analysis":"先进先出(FIFO)、近期最少使用(LRU)、最不经常使用(LFU)、随机替换均属于主流策略，全选。"},
  {"id":113,"type":"multi","typeName":"多选题","kp":"虚存优势","text":"以下哪些是虚拟存储器的优点？","options":[{"val":"A","text":"A.扩大编程空间"},{"val":"B","text":"B.提高主存利用率"},{"val":"C","text":"C.简化程序员工作"},{"val":"D","text":"D.提高磁盘速度"}],"answer":["A","B","C"],"analysis":"虚存极大扩充了用户的逻辑进程寻址空间、提升内存复用率；但无法改变或提升底层磁碟硬件速度。"},
  {"id":114,"type":"multi","typeName":"多选题","kp":"Cache性能维度","text":"以下哪些是Cache的性能指标？","options":[{"val":"A","text":"A.命中率"},{"val":"B","text":"B.缺失率"},{"val":"C","text":"C.缺失损失"},{"val":"D","text":"D.刷新周期"}],"answer":["A","B","C"],"analysis":"命中率、缺失率、失效开销(缺失损失)是衡量Cache核心准则；刷新周期是DRAM物理阻抗特性参数。"},
  {"id":115,"type":"multi","toggle":"多选题","kp":"存储层次金字塔","text":"以下哪些是存储器的层次结构？","options":[{"val":"A","text":"A.寄存器"},{"val":"B","text":"B.Cache"},{"val":"C","text":"C.主存"},{"val":"D","text":"D.硬盘"}],"answer":["A","B","C","D"],"analysis":"全系统分级演化金字塔：从最快最贵的寄存器直到最慢廉价的物理外存磁盘。全选。"},
  {"id":116,"type":"multi","typeName":"多选题","kp":"全写法特点","text":"写策略中，Write Through的特点包括：","options":[{"val":"A","text":"A.同时写Cache和主存"},{"val":"B","text":"B.使用写缓冲"},{"val":"C","text":"C.减少主存带宽需求"},{"val":"D","text":"D.适合高频写操作"}],"answer":["A","B"],"analysis":"全写法(直写法)更新Cache的同时也同步更新主存，引入写缓冲可解除CPU挂起等待；但由于频繁触发总线写内存，会大幅度消耗增加主存带宽消耗。"},
  {"id":117,"type":"multi","typeName":"多选题","kp":"存储芯片扩展","text":"主存与CPU的连接方式包括：","options":[{"val":"A","text":"A.字扩展"},{"val":"B","text":"B.位扩展"},{"val":"C","text":"C.字位同时扩展"},{"val":"D","text":"D.交叉编址"}],"answer":["A","B","C","D"],"analysis":"位扩展增加位宽，字扩展增加容量，字位组合全面扩容；多体交叉编址用以提高吞吐带宽。全选。"},
  {"id":118,"type":"multi","typeName":"多选题","kp":"存储衡量指标","text":"以下哪些是存储器的性能指标？","options":[{"val":"A","text":"A.存取时间"},{"val":"B","text":"B.存储周期"},{"val":"C","text":"C.容量"},{"val":"D","text":"D.功耗"}],"answer":["A","B","C","D"],"analysis":"速度时间、存取恢复周期、总容量、能耗功耗皆属于综合硬件性能指标。全选。"},
  {"id":119,"type":"multi","typeName":"多选题","kp":"Cache数据一致性","text":"以下哪些是Cache一致性问题？","options":[{"val":"A","text":"A.多核CPU共享Cache"},{"val":"B","text":"B.I/O设备直接访问主存"},{"val":"C","text":"C.写策略冲突"},{"val":"D","text":"D.虚拟地址转换"}],"answer":["A","B","C"],"analysis":"多核竞争多副本、DMA外设绕过CPU写主存、冲突的写击穿策略均会带来副本数据不一致风险；虚拟地址映射查表不产生多版本数据冲突。"},

  // 判断题数据
  {"id":120,"type":"tf","typeName":"判断题","kp":"冯诺依曼思想","text":"数据库管理系统是位于用户与操作系统之间的一层数据管理软件。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"存储程序、程序控制是冯氏结构的核心精髓。"},
  {"id":121,"type":"tf","typeName":"判断题","kp":"二进制原因","text":"计算机中采用二进制编码的唯一原因是运算规则简单。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"绝非唯一原因，更核心在于双稳态物理器件极其容易制造实现、同时与布尔逻辑命题完美匹配。"},
  {"id":122,"type":"tf","typeName":"判断题","kp":"补码零","text":"补码表示法中，0的表示是唯一的。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"正因原码、反码存在[+0]与[-0]的歧义双码，补码通过数轴位移使零的表示达成唯一。"},
  {"id":123,"type":"tf","typeName":"判断题","kp":"规格化浮点","text":"浮点数的规格化形式要求小数点前必须为1。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"根据IEEE 754规范，规格化二进制尾数的整数位固定隐藏为1。"},
  {"id":124,"type":"tf","typeName":"判断题","kp":"NaN概念","text":"IEEE754标准中，NaN表示非数。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"NaN(Not a Number)用于非法计算（如0除以0、负数开根号）的占位异常表达。"},
  {"id":125,"type":"tf","typeName":"判断题","kp":"立即寻址","text":"立即寻址中，操作数直接包含在指令中。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"立即数直接硬编码存放于提取出来的指令代码之中，无需进行后续访存。"},
  {"id":126,"type":"tf","typeName":"判断题","kp":"MIPS R型","text":"MIPS中，R-Type指令的功能由OP字段决定。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"R型指令的操作码(OP)全置为0，具体算术/逻辑功能完全依赖于后六位的func字段区分。"},
  {"id":127,"type":"tf","typeName":"判断题","kp":"RISC特点","text":"RISC设计风格的特点是指令系统复杂。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"指令集极度冗长复杂属于CISC(复杂指令集)典型代表；RISC精简指令集追求简单规整定长。"},
  {"id":128,"type":"tf","typeName":"判断题","kp":"MIPS返回寄存器","text":"MIPS中，$ra寄存器用于保存返回地址。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"$ra (return address)用于存储jal跳转指令执行后的下一条恢复PC。"},
  {"id":129,"type":"tf","typeName":"判断题","kp":"非数值量","text":"逻辑数据用一位表示真或假。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"1个比特位(0或1)足以完美刻画逻辑真假状态。"},
  {"id":130,"type":"tf","typeName":"判断题","kp":"汉字编码","text":"汉字内码用于输入汉字。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"键盘拼音/五笔属于输入码；内码是计算机操作系统和主存内部流通、检索、存储汉字的机内表现形式。"},
  {"id":131,"type":"tf","typeName":"判断题","kp":"十进制数编码","text":"BCD码用于表示十进制数。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"Binary-Coded Decimal (BCD) 采用4位二进制编码精准表达1位十进制0-9。"},
  {"id":132,"type":"tf","typeName":"判断题","kp":"端模式分布","text":"大端方式中，低地址存放数据的低位。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"大端法指低地址优先存放高位字节；低地址存放低位字节属于小端法特征。"},
  {"id":133,"type":"tf","typeName":"判断题","kp":"MIPS栈指针","text":"MIPS中，$sp寄存器用于保存栈指针。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"$sp (stack pointer) 始终锚定指向系统函数运行栈的栈顶。"},
  {"id":134,"type":"tf","typeName":"判断题","kp":"CISC核心技术","text":"CISC设计风格的特点是采用大量通用寄存器。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"依赖庞大寄存器堆进行装载存储、减少访存是RISC的设计核心；CISC寄存器非常珍稀短缺。"},
  {"id":135,"type":"tf","typeName":"判断题","kp":"指令长度界定","text":"指令系统设计的基本原则包括指令长度必须固定。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"仅RISC通常强制定长以简化流水线；CISC架构存在大量高度自由的非定长、变长指令。"},
  {"id":136,"type":"tf","typeName":"判断题","kp":"寻址划分","text":"直接寻址是偏移寻址的一种方式。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"偏移寻址明确要求形式地址必须伴随寄存器内容相加（基址、变址、相对）；直接寻址无任何偏移相加。"},
  {"id":137,"type":"tf","typeName":"判断题","kp":"MIPS访存","text":"MIPS中，lw指令用于从内存加载字。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"lw (load word) 负责将物理内存中32位整字搬运加载至指定寄存器。"},
  {"id":138,"type":"tf","typeName":"判断题","kp":"操作码操作数","text":"操作码是操作数的类型之一。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"操作码指明指令动作属性（加、减、存）；操作数是该动作施加的受体对象，两者根本对立。"},
  {"id":139,"type":"tf","typeName":"判断题","kp":"虚假概念","text":"操作码寻址是指令的寻址方式之一。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"纯属编造的虚假概念，寻址只针对操作数或下一条指令跳转地址，不针对操作码。"},
  {"id":140,"type":"tf","typeName":"判断题","kp":"MIPS比较指令","text":"MIPS中，slt指令用于比较两个寄存器大小。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"slt (set less than) 条件成立则目标寄存器置1，否则清0，多用于分支决策。"},
  {"id":141,"type":"tf","typeName":"判断题","kp":"风格混淆","text":"直接型是指令设计风格的类型之一。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"三大正统架构类型：累加器、堆栈、通用寄存器型。直接型非大类体系结构设计风格。"},
  {"id":142,"type":"tf","typeName":"判断题","kp":"子程序控制流","text":"MIPS中，jr指令用于从子过程返回。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"通过 jr $ra 寄存器间接跳转，使控制流安全弹回原调用函数执行点。"},
  {"id":143,"type":"tf","typeName":"判断题","kp":"硬件软件边界","text":"操作系统调用是指令的操作类型之一。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"系统调用(syscall)属于操作系统级软件抽象接口功能，非CPU硬件基本算术数据操作指令类型。"},
  {"id":144,"type":"tf","typeName":"判断题","kp":"数据通路职责","text":"数据通路的功能是控制指令的执行顺序。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"控制、调度、改写指令流执行序列是控制器的核心职责；数据通路仅承担数据的机械运算加工传送。"},
  {"id":145,"type":"tf","typeName":"判断题","kp":"元件时序特性","text":"状态元件的输出仅取决于当前输入。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"状态元件（触发器等时序逻辑）具备物理记忆，其当前输出由当前物理输入及历史内部记忆状态共同决定。"},
  {"id":146,"type":"tf","typeName":"判断题","kp":"单周期CPI","text":"单周期处理器的CPI为1。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"定义使然，每条指令的全部执行步骤紧紧收束强制占用一个时钟周期。"},
  {"id":147,"type":"tf","typeName":"判断题","kp":"多周期周期划分","text":"多周期处理器的时钟周期宽度由最长指令的执行时间决定。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"多周期将指令细分步骤，其单周期宽度由最慢的‘单步独立操作’决定，而非整条最长指令。"},
  {"id":148,"type":"tf","typeName":"判断题","kp":"lw单周期极限","text":"Load指令的执行时间是单周期处理器中最长的。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"lw由于历经取指、译码、执行、访存、写回全部五大组件路径，物理门延迟之和冠绝全指令集。"},
  {"id":149,"type":"tf","typeName":"判断题","kp":"单周期时钟核算","text":"在单周期处理器中，时钟周期的宽度由最长指令的执行时间决定。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"因为无法动态切分周期，单周期的总时钟倒数频率必须向下看齐、包容最慢那条lw指令的总开销。"},
  {"id":150,"type":"tf","typeName":"判断题","kp":"单周期控制线","text":"在单周期处理器中，控制信号在整个指令执行过程中不变。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"取指译码完成之后，多路选择器控制电平在整条指令漫长的一个时钟期内保持高低电平恒定。"},
  {"id":151,"type":"tf","typeName":"判断题","kp":"流水线本质","text":"流水线技术可以缩短单条指令的执行时间。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"流水线非但无法缩短单条指令延迟（甚至由于加入流水段缓冲寄存器使其稍有增加），但其能大幅度提高微架构的宏观指令吞吐率。"},
  {"id":152,"type":"tf","typeName":"判断题","kp":"流水线执行","text":"MIPS的Load指令需要5个阶段完成。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"标准五级流水，Load不能跳过MEM与WB，必须跑满五个相互级联的各流水寄存器段。"},
  {"id":153,"type":"tf","typeName":"判断题","kp":"转发局限","text":"转发技术可以完全消除Load-use数据冒险。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"紧邻的lw结果尚未从内存爬出来，下一条指令就要在EX阶段死等，转发无能为力，必须强制气泡硬件阻塞挂起一个周期。"},
  {"id":154,"type":"tf","typeName":"判断题","kp":"乱序执行异常","text":"动态流水线调度中，乱序完成会简化异常处理。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"乱序完成打破了程序原生态时间线序，当突发中断异常时，想要精确判定并恢复现场会带来极为复杂的硬件重排开销。"},
  {"id":155,"type":"tf","typeName":"判断题","kp":"虚存Cache尺度","text":"虚拟存储器的页大小通常比Cache的块大小要大。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"页尺寸多以KB（如4KB、8KB）为物理底数；Cache块仅在数十B（如32B、64B）级别以求高频吞吐匹配。"},
  {"id":156,"type":"tf","typeName":"判断题","kp":"DRAM物理机制","text":"DRAM的存储单元由触发器构成，因此不需要刷新。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"混淆两物，DRAM由极其微小的极板电容存储微量电荷构成，漏电极其严重必须强制周期刷新；由双稳态触发器构成、无需刷新的是SRAM。"},
  {"id":157,"type":"tf","typeName":"判断题","kp":"全相联优缺","text":"全相联映射Cache的灵活性最高，但实现复杂度也最高。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"可随意放置主存块极大降低碰撞缺失率；但由于各行并行检索对比，硬件耗费的硬件比较器规模和成本冠绝所有映射方案。"},
  {"id":158,"type":"tf","typeName":"判断题","kp":"页表加速","text":"TLB是用于加快虚拟地址到物理地址转换的缓存。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"TLB（快表）本质是专为MMU寻址页表建立的高速SRAM核心缓存项。"},
  {"id":159,"type":"tf","typeName":"判断题","kp":"写策略混淆","text":"Cache的写策略中，写回法（Write Back）会同时更新Cache和主存。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"写回法只对Cache打上脏标记，直到该行被脏替换驱逐时才做一次性写回内存；同步更新两者的是全写法(Write Through)。"},
  {"id":160,"type":"tf","typeName":"判断题","kp":"缺页机制","text":"虚拟存储器的缺页处理由硬件完成。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"硬件MMU仅在查表失效时拦截并抛出缺页中断信号异常；后续去物理磁碟搬移调度页面入内存的重任，完全由操作系统的内核中断处理软件代劳。"},
  {"id":161,"type":"tf","typeName":"判断题","kp":"局部性大类","text":"程序访问的局部性包括时间局部性和空间局部性。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"两大正统黄金基石理论，Cache和页表物理构想的理论源泉。"},
  {"id":162,"type":"tf","typeName":"判断题","kp":"物理芯片倒置","text":"SRAM通常用于构建主存，而DRAM用于构建Cache。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"完全颠倒，Cache追求极速，选用昂贵且快的SRAM；主存要求海量廉价，选用密度极高、相对慢的DRAM。"},
  {"id":163,"type":"tf","typeName":"判断题","kp":"页表信息","text":"虚拟存储器的页表中不记录磁盘地址信息。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"B","analysis":"必须记录，当有效位（Valid bit）为0提示页面在外存时，页表项地址位直接转换为存放该调出页面的物理磁碟扇区绝对地址。"},
  {"id":164,"type":"tf","typeName":"判断题","kp":"存储保护","text":"存储保护的措施包括地址越界检查和访问权限控制。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"多任务操作系统硬件底座，确保进程之间地址不越界、不越权读写内核段数据。"},
  {"id":165,"type":"tf","typeName":"判断题","kp":"结构冒险根源","text":"结构冒险是由于多条指令同时使用同一硬件资源引起的。","options":[{"val":"A","text":"正确"},{"val":"B","text":"错误"}],"answer":"A","analysis":"例：单端口内存被IF段取指和MEM段读数同时争抢，爆发典型的结构资源不可调和冲突。"},

const STORAGE_KEY = 'comp_org_quiz_state_v3';
let state = { answered: {}, wrong: {}, userAnswer: {}, revealed: {} };
let currentFilter = 'all';

try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch(e) {}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function answerLabel(q) {
  if (q.type === 'tf') return q.answer === 'A' ? '正确' : '错误';
  return q.answer;
}

function normalizeText(s) {
  return String(s || '').trim().replace(/\s+/g,'').toLowerCase();
}

function countStats() {
  const types = ['all','single','multi','tf','wrong'];
  const stats = Object.fromEntries(types.map(t=>[t,{total:0,done:0,wrong:0}]));
  
  questionsData.forEach(q=>{
    stats.all.total++;
    if(stats[q.type]) stats[q.type].total++;
    if(state.answered[q.id]) {
      stats.all.done++;
      if(stats[q.type]) stats[q.type].done++;
    }
    if(state.wrong[q.id]) {
      stats.all.wrong++;
      if(stats[q.type]) stats[q.type].wrong++;
      stats.wrong.total++;
    }
  });
  stats.wrong.done = stats.wrong.total;
  return stats;
}

function updateBoards() {
  const s = countStats();
  const done = s.all.done, total = s.all.total;
  const pct = total ? Math.round(done*100/total) : 0;
  
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('percentText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  
  ['all','single','multi','tf','wrong'].forEach(t=>{
    const el=document.getElementById('badge-'+t);
    if(el) el.textContent = t==='wrong' ? `(${s.wrong.total})` : `(${s[t].done}/${s[t].total})`;
  });
  
  const labels = [ ['single','单选'], ['multi','多选'], ['tf','判断'] ];
  document.getElementById('statsGrid').innerHTML = labels.map(([t,name])=>`
    <div class="stat">
      <b>${s[t].wrong}</b>
      <span>${name}错题 / 已做 ${s[t].done}</span>
    </div>
  `).join('');
  
  // 仅在错题集筛选模式下展示“一键重刷”按钮
  const retryBtn = document.getElementById('retryAllBtn');
  if(retryBtn) {
    retryBtn.style.display = (currentFilter === 'wrong' && s.wrong.total > 0) ? 'inline-block' : 'none';
  }
}

function getFiltered() {
  const kw = normalizeText(document.getElementById('searchInput').value);
  return questionsData.filter(q=>{
    let ok = currentFilter==='all' || (currentFilter==='wrong' ? state.wrong[q.id] : q.type===currentFilter);
    if(!ok) return false;
    if(!kw) return true;
    const hay = normalizeText([q.text,q.kp,q.typeName,answerLabel(q),q.analysis,(q.options||[]).map(o=>o.text).join(' ')].join(' '));
    return hay.includes(kw);
  });
}

function render() {
  updateBoards();
  const box = document.getElementById('quizContainer');
  const arr = getFiltered();
  if(!arr.length) {
    box.innerHTML = '<div class="empty">当前筛选条件下没有题目</div>';
    return;
  }
  box.innerHTML = arr.map(q=>cardHtml(q)).join('');
  arr.forEach(q=>{
    if(state.revealed[q.id]) showFeedback(q.id);
  });
}

function cardHtml(q) {
  const done = !!state.answered[q.id], wrong = !!state.wrong[q.id];
  const cls = wrong ? 'wrong' : done ? 'correct' : '';
  const inputName = 'q_'+q.id;
  
  let optHtml = (q.options||[]).map(o=>{
    const saved = state.userAnswer[q.id];
    const checked = Array.isArray(saved) ? saved.includes(o.val) : saved===o.val;
    const inputType = q.type==='multi' ? 'checkbox' : 'radio';
    return `
      <label class="option">
        <input type="${inputType}" name="${inputName}" value="${o.val}" ${checked?'checked':''} ${done?'disabled':''}>
        <span>${escapeHtml(o.text)}</span>
      </label>
    `;
  }).join('');
  
  return `
    <div class="question-card ${cls}" id="card_${q.id}">
      <div class="card-header">
        <div class="tags">
          <span class="tag kp">${escapeHtml(q.kp)}</span>
          <span class="tag type">${q.typeName}</span>
        </div>
        <div class="qid">#${q.id}</div>
      </div>
      <div class="question-text">${q.id}. ${escapeHtml(q.text)}</div>
      <div class="options">${optHtml}</div>
      <div class="actions">
        <button class="submit-btn" id="btn_${q.id}" onclick="submitAnswer(${q.id})" ${done?'disabled':''}>
          ${done?'已完成':'确认答案'}
        </button>
        <button class="wrong-toggle" onclick="toggleWrong(${q.id})">
          ${wrong?'移出错题':'加入错题'}
        </button>
      </div>
      <div class="feedback" id="feedback_${q.id}"></div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function getSelected(q) {
  const nodes = [...document.querySelectorAll(`input[name="q_${q.id}"]:checked`)];
  if(q.type==='multi') return nodes.map(n=>n.value).sort();
  return nodes[0]?.value || '';
}

function arraysEqual(a,b) {
  return JSON.stringify([...a].sort()) === JSON.stringify([...b].sort());
}

function submitAnswer(id) {
  const q = questionsData.find(x=>x.id===id);
  const selected = getSelected(q);
  if((Array.isArray(selected) && !selected.length) || (!Array.isArray(selected) && !selected)) {
    alert(q.type==='multi'?'请至少选择一个选项':'请先选择一个答案');
    return;
  }
  
  state.userAnswer[id] = selected;
  const correct = Array.isArray(q.answer) ? arraysEqual(selected, q.answer) : selected === q.answer;
  state.answered[id] = true;
  state.revealed[id] = true;
  
  if(!correct) state.wrong[id] = true; else delete state.wrong[id];
  saveState();
  render();
}

// 核心改进：一键重置错题集中所有题目的完成状态，保留错题集的身份进行批量重刷
function retryAllWrongQuestions() {
  const wrongIds = Object.keys(state.wrong);
  if (!wrongIds.length) return;
  
  if(confirm(`确定要一键重刷当前的 ${wrongIds.length} 道错题吗？\n（将清除这些错题的历史选择并解除锁定状态）`)) {
    wrongIds.forEach(id => {
      delete state.answered[id];
      delete state.revealed[id];
      delete state.userAnswer[id];
    });
    saveState();
    render();
  }
}

function showFeedback(id) {
  const q = questionsData.find(x=>x.id===id), el=document.getElementById('feedback_'+id);
  if(!el) return;
  const selected = state.userAnswer[id];
  let status='bad', title='回答错误 ❌';
  
  const correct = Array.isArray(q.answer) ? arraysEqual(selected||[], q.answer) : selected === q.answer;
  if(correct) { status='ok'; title='回答正确 🎉'; }
  
  let yourText = selected ? (Array.isArray(selected)?selected.join(', '):(q.type==='tf'?(selected==='A'?'正确':'错误'):selected)) : '未记录';
  
  el.className = 'feedback show ' + status;
  el.innerHTML = `
    <strong>${title}</strong><br>
    你的答案：${escapeHtml(yourText)} | 正确答案：<span class="correct-answer">${escapeHtml(answerLabel(q))}</span><br><br>
    <strong>【题目解析】</strong><br>${escapeHtml(q.analysis)}
  `;
}

function toggleWrong(id) {
  if(state.wrong[id]) {
    delete state.wrong[id];
  } else {
    state.wrong[id]=true;
  }
  saveState();
  render();
}

function clearAllRecords() {
  if(confirm('确定清空所有答题记录和错题集吗？')) {
    state={answered:{}, wrong:{}, userAnswer:{}, revealed:{}};
    saveState();
    render();
  }
}

document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=btn.dataset.filter;
  render();
}));

render();
</script>
</body>
